<!DOCTYPE html>
<html>
<head>
  <title>Gacha</title>
</head>
<body>

<button onclick="gacha()">Gacha</button>
<br><br>

<img id="img" width="200">

<script>
const items = [
  { name: "Common", chance: 60, image: "common.png" },
  { name: "Rare", chance: 30, image: "rare.png" },
  { name: "Epic", chance: 9, image: "epic.png" },
  { name: "Legendary", chance: 1, image: "legendary.png" }
];

function gacha() {
  let random = Math.random() * 100;
  let cumulative = 0;

  for (let item of items) {
    cumulative += item.chance;

    if (random < cumulative) {
      document.getElementById("img").src = item.image;
      break;
    }
  }
}
</script>

</body>
</html>
